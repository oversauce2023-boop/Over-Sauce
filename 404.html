<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الصفحة غير موجودة | Over Sauce Lounge</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#1B1F18">
<link rel="icon" type="image/png" href="/assets/brand/logo-96.png">
<link rel="apple-touch-icon" href="/assets/brand/logo-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400..700&family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/animations.css">
<style>
  .nf-wrap{
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; position: relative; overflow: hidden; text-align: center;
  }
  .nf-card{
    width: 100%; max-width: 440px;
    background: var(--ink-soft); border: 1px solid var(--line);
    border-radius: var(--radius-lg); padding: 48px 28px;
    box-shadow: var(--shadow-deep); position: relative; z-index: 2;
  }
  .nf-code{
    font-family: var(--font-display); font-size: 5rem; line-height: 1;
    color: var(--copper); margin-bottom: 8px;
  }
  .nf-logo{ font-family: var(--font-display); font-size: 1.3rem; color: var(--copper-light); margin-bottom: 24px; }
  .nf-msg{ color: var(--parchment); font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
  .nf-sub{ color: var(--brass); font-size: 0.9rem; margin-bottom: 28px; line-height: 1.7; }
  .nf-btn{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--copper), var(--copper-light));
    color: #fff; font-weight: 800; font-size: 1rem; text-decoration: none;
    box-shadow: 0 8px 24px color-mix(in srgb, var(--copper) 40%, transparent);
    transition: transform .18s ease;
  }
  .nf-btn:hover{ transform: translateY(-2px); }
  .nf-glow{ position: absolute; width: 480px; height: 480px; border-radius: 50%; filter: blur(120px); opacity: 0.16; z-index: 1; background: var(--copper); top: -160px; inset-inline-start: -120px; }
</style>
</head>
<body class="antialiased">
<div class="grain"></div>
<div class="nf-wrap">
  <div class="nf-glow" aria-hidden="true"></div>
  <div class="nf-card reveal in">
    <p class="nf-logo">Over Sauce Lounge</p>
    <div class="nf-code" aria-hidden="true">٤٠٤</div>
    <p class="nf-msg">الصفحة غير موجودة</p>
    <p class="nf-sub">يبدو أن الرابط الذي فتحته لم يعد متاحًا. لا تقلق — قائمتنا الشهية بانتظارك.</p>
    <a href="/" class="nf-btn">
      <span aria-hidden="true">→</span> العودة إلى القائمة
    </a>
  </div>
</div>
</body>
</html>
